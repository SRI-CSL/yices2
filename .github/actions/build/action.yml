name: Build

inputs:
  mode:
    required: true
  config-opt:
    required: false
    default: ""
  env:
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Build and install libpoly
      if: contains(inputs.config-opt, '--enable-mcsat')
      shell: bash
      run: |
        # Set Homebrew environment variables for macOS
        if [[ "$(uname)" == "Darwin" ]]; then
          if [ -d /opt/homebrew ]; then
            BREW_PREFIX=/opt/homebrew
          else
            BREW_PREFIX=/usr/local
          fi
          export CPPFLAGS="-I$BREW_PREFIX/include"
          export LDFLAGS="-L$BREW_PREFIX/lib"
          export PKG_CONFIG_PATH="$BREW_PREFIX/lib/pkgconfig"
          export DYLD_LIBRARY_PATH="$BREW_PREFIX/lib:$DYLD_LIBRARY_PATH"
        else
          export LD_LIBRARY_PATH=/usr/local/lib/:${LD_LIBRARY_PATH}
        fi
        pushd .
        git clone https://github.com/SRI-CSL/libpoly.git
        mkdir -p libpoly/build
        cd libpoly/build
        ${{ inputs.env }} cmake ..
        make
        sudo make install
        popd
    - name: Build and install CUDD
      if: contains(inputs.config-opt, '--enable-mcsat')
      shell: bash
      run: |
        # Set Homebrew environment variables for macOS
        if [[ "$(uname)" == "Darwin" ]]; then
          if [ -d /opt/homebrew ]; then
            BREW_PREFIX=/opt/homebrew
          else
            BREW_PREFIX=/usr/local
          fi
          export CPPFLAGS="-I$BREW_PREFIX/include"
          export LDFLAGS="-L$BREW_PREFIX/lib"
          export PKG_CONFIG_PATH="$BREW_PREFIX/lib/pkgconfig"
          export DYLD_LIBRARY_PATH="$BREW_PREFIX/lib:$DYLD_LIBRARY_PATH"
        else
          export LD_LIBRARY_PATH=/usr/local/lib/:${LD_LIBRARY_PATH}
        fi
        pushd .
        git clone https://github.com/ivmai/cudd.git
        cd cudd
        git checkout tags/cudd-3.0.0
        autoreconf -fi
        ${{ inputs.env }} ./configure --enable-shared
        make
        sudo make install
        popd
    - name: Build and install CaDiCaL (gcov coverage build only)
      if: inputs.mode == 'gcov' && runner.os == 'Linux'
      shell: bash
      run: |
        # The yices code targets CaDiCaL 3.0 (uses ccadical_declare_one_more_variable
        # and the "factor" option toggle). Ubuntu's libcadical-dev is 1.7.4, which
        # predates that API, so we build the upstream rel-3.0.0 tag from source.
        pushd .
        git clone --depth 1 --branch rel-3.0.0 https://github.com/arminbiere/cadical.git
        cd cadical
        # Both CFLAGS and CXXFLAGS need -fPIC: kitten.c (used by CaDiCaL's
        # internal SAT helper) is compiled by $(CC), so CXXFLAGS alone leaves
        # kitten.o without -fPIC and the resulting libcadical.a cannot be
        # linked into yices's libyices.so.
        CFLAGS=-fPIC CXXFLAGS=-fPIC ./configure
        make -j"$(nproc)"
        sudo install -d /usr/local/include /usr/local/lib
        sudo install -m 644 build/libcadical.a /usr/local/lib/
        sudo install -m 644 src/ccadical.h /usr/local/include/
        popd
    - name: Build and test Yices
      shell: bash
      run: |
        # Set Homebrew environment variables for macOS
        if [[ "$(uname)" == "Darwin" ]]; then
          if [ -d /opt/homebrew ]; then
            BREW_PREFIX=/opt/homebrew
          else
            BREW_PREFIX=/usr/local
          fi
          export CPPFLAGS="-I$BREW_PREFIX/include"
          export LDFLAGS="-L$BREW_PREFIX/lib"
          export PKG_CONFIG_PATH="$BREW_PREFIX/lib/pkgconfig"
          export DYLD_LIBRARY_PATH="$BREW_PREFIX/lib:$DYLD_LIBRARY_PATH"
        else
          export LD_LIBRARY_PATH=/usr/local/lib/:${LD_LIBRARY_PATH}
        fi
        autoconf
        make clean || true
        # Enable the CaDiCaL delegate in the gcov build so the new
        # selector-frames code paths are exercised by both the API tests
        # and the regression suite (tests/regress/bv/incr-cadical-*).
        # CaDiCaL 3.0 was installed from source in the previous step.
        if [ "${{ inputs.mode }}" = "gcov" ] && [ "$(uname)" = "Linux" ]; then
          export CPPFLAGS="${CPPFLAGS:-} -DHAVE_CADICAL"
          export LIBS="${LIBS:-} -lcadical -lstdc++ -lm"
        fi
        CFLAGS='-Werror' ${{ inputs.env }} ./configure ${{ inputs.config-opt }}
        make MODE=${{ inputs.mode }}
