name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-push:
    if: github.event_name == 'push'
    strategy:
      matrix:
        os: [ubuntu-latest]
        mode: [debug, release]
        config-opt: [--enable-mcsat]
        env: [CC=gcc CXX=g++]
        include:
          - os: ubuntu-latest
            mode: gcov
            config-opt: --enable-mcsat
            env: CC=gcc-13 CXX=g++-13
          - os: ubuntu-latest
            mode: debug
            config-opt: --enable-thread-safety --enable-mcsat
            env: CC=gcc CXX=g++
          - os: ubuntu-latest
            mode: release
            config-opt: --enable-thread-safety --enable-mcsat
            env: CC=gcc CXX=g++
          - os: ubuntu-latest
            mode: gcov
            config-opt: --enable-thread-safety --enable-mcsat
            env: CC=gcc-13 CXX=g++-13
    name: ${{ matrix.os }}|${{ matrix.mode }}|${{ matrix.config-opt }}|${{ matrix.env }} (push)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies
      - name: Build
        uses: ./.github/actions/build
        with:
          mode: ${{ matrix.mode }}
          config-opt: ${{ matrix.config-opt }}
          env: ${{ matrix.env }}
      - name: Test
        uses: ./.github/actions/test
        env:
          TIME_LIMIT: ${{ matrix.mode == 'gcov' && contains(matrix.config-opt, '--enable-thread-safety') && contains(matrix.config-opt, '--enable-mcsat') && '120' || '60' }}
          REGRESS_EXCLUDE_FILTER: ${{ matrix.mode == 'gcov' && contains(matrix.config-opt, '--enable-thread-safety') && contains(matrix.config-opt, '--enable-mcsat') && 'tests/regress/iss517.smt2' || '' }}
        with:
          mode: ${{ matrix.mode }}
      - name: Coverage
        if: matrix.mode == 'gcov' && matrix.config-opt == '--enable-mcsat'
        uses: ./.github/actions/coverage
      - name: Coveralls
        if: matrix.mode == 'gcov' && matrix.config-opt == '--enable-mcsat'
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: 'coverage.info'

  build-pr:
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        mode: [debug, release]
        config-opt: [--enable-mcsat, --enable-thread-safety]
        env: [CC=gcc CXX=g++, CC=clang CXX=clang++]
        exclude:
          - os: macos-latest
            env: CC=gcc CXX=g++
        include:
          - os: ubuntu-latest
            mode: gcov
            config-opt: --enable-mcsat
            env: CC=gcc-13 CXX=g++-13
          - os: ubuntu-latest
            mode: debug
            config-opt: --enable-thread-safety --enable-mcsat
            env: CC=gcc CXX=g++
          - os: ubuntu-latest
            mode: release
            config-opt: --enable-thread-safety --enable-mcsat
            env: CC=gcc CXX=g++
          - os: ubuntu-latest
            mode: gcov
            config-opt: --enable-thread-safety --enable-mcsat
            env: CC=gcc-13 CXX=g++-13
          - os: macos-latest
            mode: debug
            config-opt: --enable-thread-safety --enable-mcsat
            env: CC=clang CXX=clang++
          - os: macos-latest
            mode: release
            config-opt: --enable-thread-safety --enable-mcsat
            env: CC=clang CXX=clang++
    name: ${{ matrix.os }}|${{ matrix.mode }}|${{ matrix.config-opt }}|${{ matrix.env }} (pr)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies
      - name: Build
        uses: ./.github/actions/build
        with:
          mode: ${{ matrix.mode }}
          config-opt: ${{ matrix.config-opt }}
          env: ${{ matrix.env }}
      - name: Test
        uses: ./.github/actions/test
        env:
          TIME_LIMIT: ${{ matrix.mode == 'gcov' && contains(matrix.config-opt, '--enable-thread-safety') && contains(matrix.config-opt, '--enable-mcsat') && '120' || '60' }}
          REGRESS_EXCLUDE_FILTER: ${{ matrix.mode == 'gcov' && contains(matrix.config-opt, '--enable-thread-safety') && contains(matrix.config-opt, '--enable-mcsat') && 'tests/regress/iss517.smt2' || '' }}
        with:
          mode: ${{ matrix.mode }}
      - name: Coverage
        if: matrix.mode == 'gcov' && matrix.config-opt == '--enable-mcsat'
        uses: ./.github/actions/coverage
      - name: Coveralls
        if: matrix.mode == 'gcov' && matrix.config-opt == '--enable-mcsat'
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: 'coverage.info'
